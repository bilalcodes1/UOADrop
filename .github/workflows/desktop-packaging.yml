name: Desktop Packaging

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: uoadrop-desktop-macos
            build_command: pnpm --filter @uoadrop/desktop run dist:mac
            artifact_paths: |
              apps/desktop/release/*.dmg
              apps/desktop/release/*.zip
              apps/desktop/release/*.blockmap
              apps/desktop/release/builder-effective-config.yaml
          - os: windows-2022
            artifact_name: uoadrop-desktop-windows
            build_command: pnpm --filter @uoadrop/desktop run dist:win
            artifact_paths: |
              apps/desktop/release/*.exe
              apps/desktop/release/*.blockmap
              apps/desktop/release/builder-effective-config.yaml
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build desktop artifacts
        run: ${{ matrix.build_command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
